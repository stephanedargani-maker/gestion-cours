{% extends "base.html" %}
{% block title %}Connexion — GestionCours{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 flex items-center justify-center mx-auto mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:2rem" class="text-gray-900">Connexion</h1>
      <p class="text-gray-500 mt-1 text-sm">Accédez à votre espace personnel</p>
    </div>

    <div class="glass-card p-8">
      {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-info{% endif %} mb-5 rounded-xl text-sm">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-control mb-5">
          <label class="label pb-1"><span class="label-text font-medium text-gray-700">Nom d'utilisateur</span></label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <input type="text" name="username" placeholder="Votre identifiant" autocomplete="username" class="input input-bordered w-full pl-9 bg-gray-50 border-gray-200 focus:border-indigo-400 focus:bg-white rounded-xl" required>
          </div>
        </div>

        <div class="form-control mb-8">
          <label class="label pb-1"><span class="label-text font-medium text-gray-700">Mot de passe</span></label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" name="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" class="input input-bordered w-full pl-9 pr-10 bg-gray-50 border-gray-200 focus:border-indigo-400 focus:bg-white rounded-xl" required>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-0 w-full rounded-xl text-base font-semibold">
          Se connecter →
        </button>
      </form>

      <div class="divider text-gray-300 text-xs my-5">ou</div>
      <a href="{% url 'cours:register' %}" class="btn btn-outline border-indigo-200 text-indigo-600 hover:bg-indigo-50 w-full rounded-xl">Créer un compte</a>
    </div>
  </div>
</div>
<script>
function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
